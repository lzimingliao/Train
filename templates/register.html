<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 极速城际票务管理系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a56db;
            --primary-hover: #1e429f;
            --bg-color: #f3f4f6;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --error-color: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            background-image: radial-gradient(#d1d5db 1px, transparent 1px);
            background-size: 24px 24px;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 520px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(to right, #1e3a8a, #1a56db);
            padding: 30px 30px;
            text-align: center;
            color: white;
        }

        .auth-header .brand-icon {
            font-size: 32px;
            margin-bottom: 12px;
            color: #93c5fd;
        }

        .auth-header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .auth-header p {
            font-size: 13px;
            color: #bfdbfe;
            opacity: 0.9;
        }

        .auth-body {
            padding: 30px;
        }

        .alert-box {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-box.success { background: #ecfdf5; color: #065f46; border-left: 4px solid #10b981; }
        .alert-box.error { background: #fef2f2; color: #991b1b; border-left: 4px solid var(--error-color); }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 8px;
        }

        .form-control {
            margin-bottom: 16px;
        }
        .form-control.full-width {
            grid-column: 1 / -1;
        }

        .form-control label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .form-control label .required {
            color: var(--error-color);
            margin-left: 4px;
        }

        .input-group {
            position: relative;
        }
        .input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        .input-group input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-main);
            transition: all 0.2s ease;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.1);
        }
        .input-group input::placeholder {
            color: #9ca3af;
            font-size: 13px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 16px;
        }
        .submit-btn:hover { background-color: var(--primary-hover); }

        .form-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .form-footer a {
            color: var(--primary-color);
            font-weight: 600;
            text-decoration: none;
        }
        .form-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- 头部品牌区域 -->
        <div class="auth-header">
            <i class="fas fa-id-card brand-icon"></i>
            <h1>实名注册</h1>
            <p>Real-name Registration System</p>
        </div>

        <!-- 表单区域 -->
        <div class="auth-body">

            <!-- Flask 消息闪现 -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert-box {{ category }}">
                            <i class="fas {% if category == 'success' %}fa-check-circle{% else %}fa-exclamation-circle{% endif %}"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/register" method="POST">
                <div class="form-grid">

                    <!-- 账号 -->
                    <div class="form-control full-width">
                        <label for="username">登录账号<span class="required">*</span></label>
                        <div class="input-group">
                            <i class="far fa-user"></i>
                            <input type="text" id="username" name="username" placeholder="设置您的系统唯一登录名" required>
                        </div>
                    </div>

                    <!-- 密码 -->
                    <div class="form-control full-width">
                        <label for="password">登录密码<span class="required">*</span></label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="≥6位，须含字母/数字/符号中的2种" required>
                        </div>
                    </div>

                    <!-- 姓名 -->
                    <div class="form-control">
                        <label for="name">真实姓名<span class="required">*</span></label>
                        <div class="input-group">
                            <i class="far fa-id-badge"></i>
                            <input type="text" id="name" name="name" placeholder="乘车人姓名" required>
                        </div>
                    </div>

                    <!-- 手机号 -->
                    <div class="form-control">
                        <label for="phone">手机号码</label>
                        <div class="input-group">
                            <i class="fas fa-mobile-alt"></i>
                            <input type="text" id="phone" name="phone" placeholder="11位手机号 (选填)">
                        </div>
                    </div>

                    <!-- 身份证 -->
                    <div class="form-control full-width">
                        <label for="id_num">中国大陆居民身份证<span class="required">*</span></label>
                        <div class="input-group">
                            <i class="far fa-address-card"></i>
                            <input type="text" id="id_num" name="id_num" placeholder="18位有效身份证号码" required>
                        </div>
                    </div>

                </div>

                <button type="submit" class="submit-btn">
                    提交注册信息
                </button>
            </form>

            <div class="form-footer">
                已拥有系统账号？ <a href="/login">返回登录页面</a>
            </div>
        </div>
    </div>

</body>
</html>
