{% if active_tab == 'book' or active_tab == 'query' %}
<div class="panel-card">
    <div class="card-header"><i class="fas fa-filter"></i> 车票查询</div>
    <p class="section-note">支持区间查询和车站查询，站名按全称精确匹配。结果按任务书要求排序。</p>

    <div class="split-layout">
        <div class="sub-card">
            <h4><i class="fas fa-route"></i> 区间查询</h4>
            <form action="/do_query" method="GET">
                <input type="hidden" name="search_type" value="interval">
                <input type="hidden" name="source_tab" value="{{ active_tab }}">
                <div class="form-row">
                    <div class="input-group"><label>乘车日期</label><input type="date" name="date" required></div>
                    <div class="input-group"><label>出发站</label><input type="text" name="start_station" required placeholder="例如: 北京南"></div>
                    <div class="input-group"><label>目的地</label><input type="text" name="end_station" required placeholder="例如: 上海虹桥"></div>
                </div>
                <button class="btn btn-primary" style="width: 100%;"><i class="fas fa-search"></i> 查询</button>
            </form>
        </div>

        <div class="sub-card">
            <h4><i class="fas fa-map-marker-alt"></i> 车站查询</h4>
            <form action="/do_query" method="GET">
                <input type="hidden" name="search_type" value="station">
                <input type="hidden" name="source_tab" value="{{ active_tab }}">
                <div class="form-row">
                    <div class="input-group"><label>乘车日期</label><input type="date" name="date" required></div>
                    <div class="input-group"><label>途径车站</label><input type="text" name="station" placeholder="例如: 南京南" required></div>
                </div>
                <button class="btn btn-outline" style="width: 100%;"><i class="fas fa-list"></i> 查询</button>
            </form>
        </div>
    </div>
</div>
{% endif %}
