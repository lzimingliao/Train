{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
        <div class="alert-box {{ category }}">
            <i class="fas {% if category == 'success' %}fa-check-circle{% else %}fa-info-circle{% endif %}"></i> {{ message }}
        </div>
        {% endfor %}
    {% endif %}
{% endwith %}
