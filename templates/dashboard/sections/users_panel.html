{% if active_tab == 'users' %}
<div class="panel-card">
    <div class="card-header"><i class="fas fa-users"></i> 系统用户档案</div>
    <table>
        <tr><th>身份证号 (主键)</th><th>账号与姓名</th><th>联系电话</th><th>系统角色</th><th>管理操作</th></tr>
        {% for u in users %}
        <tr>
            <form action="/admin_manage_user" method="POST">
                <input type="hidden" name="id_num" value="{{ u.id_num }}">
                <td style="font-family:monospace; color:#4b5563;">{{ u.id_num }}</td>
                <td>
                    <div style="display:flex; flex-direction:column; gap:6px;">
                        <input type="text" value="{{ u.username }}" readonly style="border:none; padding:0; background:transparent; font-weight:600; color:var(--text-main);">
                        <input type="text" name="name" value="{{ u.name }}" placeholder="真实姓名" style="padding:6px; font-size:13px; max-width: 120px;">
                    </div>
                </td>
                <td><input type="text" name="phone" value="{{ u.phone }}" placeholder="手机号" style="padding:6px; font-size:13px; max-width: 120px;"></td>
                <td><span class="badge {% if u.role=='admin' %}badge-red{% else %}badge-blue{% endif %}">{{ u.role }}</span></td>
                <td>
                    <div style="display:flex; gap:8px;">
                        <button type="submit" name="action" value="edit" class="btn btn-outline" style="padding:6px 10px;" title="保存修改"><i class="fas fa-save"></i></button>
                        <button type="submit" name="action" value="delete" class="btn btn-outline" style="padding:6px 10px; color:var(--danger-color); border-color:#fca5a5;" onclick="return confirm('确认删除该用户档案？')" title="删除用户"><i class="fas fa-trash"></i></button>
                    </div>
                </td>
            </form>
        </tr>
        {% endfor %}
    </table>
</div>
{% endif %}
