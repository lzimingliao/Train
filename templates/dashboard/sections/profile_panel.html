{% if active_tab == 'profile' %}
<div class="panel-card">
    <div class="card-header"><i class="fas fa-id-card"></i> 个人信息</div>
    <p class="section-note">可维护账号名、姓名和手机号。身份证号为实名信息，不支持修改。</p>
    <form action="/update_profile" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="profile-grid">
            <div class="input-group">
                <label>账号名</label>
                <input type="text" name="username" value="{{ user.username }}" required>
            </div>
            <div class="input-group">
                <label>姓名</label>
                <input type="text" name="name" value="{{ user.name }}" required>
            </div>
            <div class="input-group">
                <label>手机号</label>
                <input type="text" name="phone" value="{{ user.phone or '' }}" placeholder="请输入11位手机号">
            </div>
            <div class="input-group">
                <label>身份证号（锁定）</label>
                <input type="text" value="{{ user.id_num }}" readonly disabled>
            </div>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 保存信息</button>
            <a href="/" class="btn btn-outline"><i class="fas fa-arrow-left"></i> 返回查询页</a>
        </div>
    </form>
</div>
{% endif %}
