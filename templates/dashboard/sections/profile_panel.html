{% if active_tab == 'profile' %}
<div class="panel-card">
    <div class="card-header"><i class="fas fa-id-card"></i> 账号基本资料</div>
    <p class="section-note">当前页面用于维护个人账号信息。证件号为系统主键，不支持修改。</p>
    <form action="/update_profile" method="POST">
        <div class="profile-grid">
            <div class="input-group">
                <label>登录账号</label>
                <input type="text" name="username" value="{{ user.username }}" required>
            </div>
            <div class="input-group">
                <label>真实姓名</label>
                <input type="text" name="name" value="{{ user.name }}" required>
            </div>
            <div class="input-group">
                <label>联系电话</label>
                <input type="text" name="phone" value="{{ user.phone or '' }}" placeholder="请输入11位手机号">
            </div>
            <div class="input-group">
                <label>证件号码 (系统主键，不可修改)</label>
                <input type="text" value="{{ user.id_num }}" readonly disabled>
            </div>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> 保存修改</button>
            <a href="/" class="btn btn-outline"><i class="fas fa-arrow-left"></i> 返回首页</a>
        </div>
    </form>
</div>
{% endif %}
