{% if active_tab == 'orders' %}
{% if reschedule_order_id %}
<div class="sub-card sub-card-accent">
    <h4><i class="fas fa-sync-alt"></i> 改签进行中</h4>
    <p class="section-note">当前订单：<strong>{{ reschedule_order_id }}</strong></p>
    <div class="compact-hint">
        <p><i class="fas fa-angle-right"></i> 在左侧“改签候选车次”中选择车次和座位后确认改签。</p>
        <p><i class="fas fa-angle-right"></i> 如需重新筛选，可修改日期和站点后再次查询。</p>
    </div>
    <form action="/do_query" method="GET" style="margin-top: 12px;">
        <input type="hidden" name="search_type" value="interval">
        <input type="hidden" name="source_tab" value="orders">
        <input type="hidden" name="reschedule_order_id" value="{{ reschedule_order_id }}">
        <div class="input-group" style="margin-bottom: 8px;"><label>日期</label><input type="date" name="date" required value="{{ request.args.get('date', '') }}"></div>
        <div class="input-group" style="margin-bottom: 8px;"><label>出发站</label><input type="text" name="start_station" required value="{{ request.args.get('start_station', '') }}"></div>
        <div class="input-group"><label>到达站</label><input type="text" name="end_station" required value="{{ request.args.get('end_station', '') }}"></div>
        <button class="btn btn-outline" style="width: 100%; margin-top: 10px;"><i class="fas fa-search"></i> 重新筛选车次</button>
    </form>
    <a href="/orders_ui" class="btn btn-primary" style="width: 100%; margin-top: 10px;"><i class="fas fa-times-circle"></i> 退出改签模式</a>
</div>
{% else %}
<div class="sub-card">
    <h4><i class="fas fa-list-ul"></i> 改签入口</h4>
    <p class="section-note">在左侧订单列表点击“改签”即可进入候选车次选择。</p>
    <div class="compact-hint">
        <p><i class="fas fa-circle"></i> 仅支持未发车订单</p>
        <p><i class="fas fa-circle"></i> 推荐先看同区间同日期车次</p>
        <p><i class="fas fa-circle"></i> 目标车次需有余票</p>
    </div>
</div>
{% endif %}
{% endif %}
