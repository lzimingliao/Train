{% if active_tab == 'trains' %}
<div class="panel-card">
    <div class="card-header"><i class="fas fa-plus-circle"></i> 录入新车次</div>
    <form action="/admin_manage_train" method="POST">
        <input type="hidden" name="action" value="add">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px;">
            <div class="input-group"><label>车次编号</label><input type="text" name="train_no" placeholder="例如: G101" required></div>
            <div class="input-group"><label>出发站</label><input type="text" name="dep_station" required></div>
            <div class="input-group"><label>到达站</label><input type="text" name="arr_station" required></div>
            <div class="input-group"><label>出发时间</label><input type="datetime-local" name="dep_time" required></div>
            <div class="input-group"><label>到达时间</label><input type="datetime-local" name="arr_time" required></div>
            <div class="input-group"><label>票价 (¥)</label><input type="number" step="0.1" name="price" required></div>
            <div class="input-group"><label>车厢数</label><input type="number" name="carriage_count" value="8" required></div>
            <div class="input-group"><label>总座位数</label><input type="number" name="total_seats" value="160" required></div>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-upload"></i> 提交录入</button>
    </form>
</div>

<div class="panel-card">
    <div class="card-header"><i class="fas fa-list"></i> 已录入车次管理</div>
    <table>
        <tr><th>车次编号</th><th>行程区间</th><th>票价与容量</th><th>操作</th></tr>
        {% for t in trains %}
        <tr>
            <td><strong>{{ t.train_no }}</strong></td>
            <td>
                <span style="font-weight:500;">{{ t.dep_station }} ➔ {{ t.arr_station }}</span><br>
                <span style="font-size:12px; color:#6b7280;">{{ t.dep_time.strftime('%Y-%m-%d %H:%M') }} 发车</span>
            </td>
            <td>
                <span>¥{{ t.price }}</span> <br>
                <span class="badge badge-gray" style="margin-top:4px;">余 {{ t.rem_seats }} / 总 {{ t.total_seats }}</span>
            </td>
            <td>
                <form action="/admin_manage_train" method="POST">
                    <input type="hidden" name="action" value="delete">
                    <input type="hidden" name="train_no" value="{{ t.train_no }}">
                    <button class="btn btn-outline" style="color:var(--danger-color); border-color:#fca5a5; padding: 6px 10px;" onclick="return confirm('警告：确认要删除此车次记录吗？')">删除车次</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endif %}
